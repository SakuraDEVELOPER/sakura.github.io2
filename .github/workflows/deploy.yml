name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SUPABASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_SUPABASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_SUPABASE_LIVE_SYNC_ENABLED: "true"
      NEXT_PUBLIC_SUPABASE_SYNC_FUNCTION_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_SYNC_FUNCTION_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Supabase public env
        run: |
          test -n "$NEXT_PUBLIC_SUPABASE_URL" || (echo "Missing NEXT_PUBLIC_SUPABASE_URL" && exit 1)
          test -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY" || (echo "Missing NEXT_PUBLIC_SUPABASE_ANON_KEY" && exit 1)
          test -n "$NEXT_PUBLIC_SUPABASE_STORAGE_BUCKET" || (echo "Missing NEXT_PUBLIC_SUPABASE_STORAGE_BUCKET" && exit 1)
          test "$NEXT_PUBLIC_SUPABASE_LIVE_SYNC_ENABLED" = "true" || (echo "NEXT_PUBLIC_SUPABASE_LIVE_SYNC_ENABLED must be true" && exit 1)

      - name: Build static export
        run: npm run build

      - name: Ensure GitHub Pages serves _next assets
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
